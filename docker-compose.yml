services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: demetra
      MYSQL_USER: demetra
      MYSQL_PASSWORD: demetra_password
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u demetra -pdemetra_password --silent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: sh -c "npm run prisma:push && npm start"
    environment:
      PORT: 3000
      DATABASE_URL: mysql://demetra:demetra_password@db:3306/demetra
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-this-local-secret-at-least-32-characters
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
      CORS_ORIGIN_PATTERN: ^https://.*\\.ngrok-free\\.app$,^https://.*\\.ngrok-free\\.dev$
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    environment:
      DATABASE_URL: mysql://demetra:demetra_password@db:3306/demetra
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: /api
      VITE_SOCKET_URL: /socket.io

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  mysqldata:
